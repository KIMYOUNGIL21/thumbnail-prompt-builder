<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>유튜브 썸네일 프롬프트 빌더</title>
<!-- PWA: 홈 화면 추가 시 주소창 없는 전체화면 앱처럼 실행 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="썸네일 빌더">
<meta name="theme-color" content="#15110f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#15110f; --panel:#1f1a17; --panel2:#272019; --line:#3a2f27;
    --text:#efe7dd; --muted:#a99a8b; --accent:#e0916b; --accent2:#caa6e0;
    --chip:#2c241d; --chip-on:#e0916b; --chip-on-text:#1a120c; --good:#7fc8a0;
  }
  /* 힐링(만화) 탭은 더 산뜻한 파스텔 팔레트 */
  body[data-tab="healing"]{
    --bg:#0f1418; --panel:#171f25; --panel2:#1d262d; --line:#2c3a44;
    --text:#e7eef2; --muted:#90a6b2; --accent:#79b8d6; --accent2:#e7a6c6;
    --chip:#1b262d; --chip-on:#79b8d6; --chip-on-text:#08161d;
  }
  /* 감성 플리(실사 여성) 탭은 노을 로즈 팔레트 */
  body[data-tab="vibe"]{
    --bg:#16121a; --panel:#201a27; --panel2:#27202f; --line:#3a2f44;
    --text:#efe7f0; --muted:#a99bb0; --accent:#e08bb0; --accent2:#b9a0e8;
    --chip:#241d2c; --chip-on:#e08bb0; --chip-on-text:#1a1020;
  }
  *{box-sizing:border-box}
  body{
    margin:0; color:var(--text); transition:background .3s;
    background:radial-gradient(1200px 600px at 70% -10%, #2a1d17 0%, var(--bg) 55%);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif; line-height:1.6;
    padding:calc(28px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) 80px calc(18px + env(safe-area-inset-left));
  }
  body[data-tab="healing"]{ background:radial-gradient(1200px 600px at 70% -10%, #16303d 0%, var(--bg) 55%); }
  body[data-tab="vibe"]{ background:radial-gradient(1200px 600px at 70% -10%, #3a2030 0%, var(--bg) 55%); }
  .wrap{max-width:1180px; margin:0 auto}
  header h1{font-size:26px; margin:0 0 6px; letter-spacing:-.4px}
  header h1 .em{color:var(--accent)}
  header p{margin:0; color:var(--muted); font-size:14px}
  .meta{margin-top:10px; font-size:13px; color:var(--muted)}
  .meta b{color:var(--accent2)}

  .tabs{display:flex; gap:8px; margin:22px 0 18px; flex-wrap:wrap}
  .tab{background:var(--panel2); border:1px solid var(--line); color:var(--muted);
    padding:10px 18px; border-radius:10px; cursor:pointer; font-weight:700; font-size:14px; transition:.12s}
  .tab:hover{border-color:var(--accent)}
  .tab.on{background:var(--accent); color:var(--chip-on-text); border-color:var(--accent)}

  .layout{display:grid; grid-template-columns:1fr 420px; gap:22px; align-items:start}
  @media(max-width:920px){ .layout{grid-template-columns:1fr} }

  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px}
  .axis{margin-bottom:16px}
  .axis:last-child{margin-bottom:0}
  .axis .lbl{font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:600; letter-spacing:.3px}
  .axis .lbl span{color:var(--accent); font-weight:400}
  .chips{display:flex; flex-wrap:wrap; gap:7px}
  .chip{background:var(--chip); border:1px solid var(--line); color:var(--text);
    padding:6px 12px; border-radius:999px; font-size:13px; cursor:pointer; transition:.12s; user-select:none}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--chip-on); color:var(--chip-on-text); border-color:var(--chip-on); font-weight:600}

  .preview{position:sticky; top:18px}
  .preview h3{margin:0 0 10px; font-size:14px; color:var(--muted)}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px}
  .btn{background:var(--panel2); border:1px solid var(--line); color:var(--text);
    padding:9px 14px; border-radius:10px; font-size:13.5px; cursor:pointer; transition:.12s; font-weight:600}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent); color:var(--chip-on-text); border-color:var(--accent)}
  .btn.primary:hover{filter:brightness(1.07)}
  .promptbox{background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:14px;
    font-size:14.5px; line-height:1.7; white-space:pre-wrap; min-height:230px; color:var(--text)}
  .hint{font-size:12px; color:var(--muted); margin-top:10px}

  .section-title{font-size:18px; margin:40px 0 4px; letter-spacing:-.3px}
  .section-sub{color:var(--muted); font-size:13.5px; margin:0 0 18px}
  .gallery{display:grid; grid-template-columns:repeat(auto-fill,minmax(min(330px,100%),1fr)); gap:16px}
  .gcard{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; display:flex; flex-direction:column}
  .gcard .gname{font-size:15px; font-weight:700; margin-bottom:4px}
  .gcard .gtag{font-size:11.5px; color:var(--accent2); margin-bottom:10px; letter-spacing:.2px}
  .gcard .gtext{font-size:13px; color:var(--text); opacity:.92; line-height:1.65; flex:1;
    background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:11px; margin-bottom:12px}
  .gcard .grow{display:flex; gap:8px}
  .gcard .btn{flex:1; text-align:center; font-size:13px; padding:8px}

  #toast{position:fixed; left:50%; bottom:34px; transform:translateX(-50%) translateY(20px);
    background:var(--good); color:#0e1a12; padding:11px 20px; border-radius:10px; font-weight:700;
    font-size:14px; opacity:0; pointer-events:none; transition:.25s; z-index:50; box-shadow:0 8px 30px rgba(0,0,0,.4)}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .foot{margin-top:48px; color:var(--muted); font-size:12.5px; text-align:center; line-height:1.8}
  /* 좁은 폰 화면 최적화 */
  @media(max-width:520px){
    body{padding:calc(16px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 60px calc(12px + env(safe-area-inset-left))}
    header h1{font-size:22px}
    .card{padding:14px}
    .preview{position:static}
    .chip{padding:7px 12px; font-size:13.5px}
  }
</style>
</head>
<body data-tab="ballad">
<div class="wrap">
  <header>
    <h1 id="title"></h1>
    <p id="subtitle"></p>
    <div class="meta">고정 코어는 그대로 두고 아래 항목만 바꿔서 변주를 만듭니다 · 이론상 조합 수 <b id="combos">–</b>가지</div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="layout">
    <div class="card" id="builder"></div>
    <div class="card preview">
      <h3>📋 완성 프롬프트</h3>
      <div class="toolbar">
        <button class="btn primary" onclick="copyCurrent()">복사하기</button>
        <button class="btn" onclick="randomize()">🎲 랜덤 조합</button>
        <button class="btn" onclick="resetPicks()">처음으로</button>
      </div>
      <div class="promptbox" id="promptbox"></div>
      <div class="hint" id="hint"></div>
    </div>
  </div>

  <h2 class="section-title">⭐ 추천 변주 프리셋</h2>
  <p class="section-sub">바로 복사해서 쓸 수 있는 완성형. “빌더에 불러오기”를 누르면 위 빌더에 세팅돼서 더 손볼 수 있어요.</p>
  <div class="gallery" id="gallery"></div>

  <div class="foot">
    이미지 안에 텍스트/로고/워터마크는 자동으로 “넣지 않는다”가 포함되어 있습니다.<br>
    파일 위치: D:\work\thumbnail-prompts\index.html · 인터넷 없이 더블클릭으로 실행됩니다.
  </div>
</div>
<div id="toast">복사됨!</div>

<script>
/* ============================================================
   탭 = 썸네일 컨셉. 각 탭은 고정 코어 + 변주 축 + 프리셋을 가진다.
   ============================================================ */
const TABS = {
  /* ---------- 탭 1: 슬픈 발라드 (실사) ---------- */
  ballad: {
    label:"🎤 슬픈 발라드 (실사)",
    title:'🎤 슬픈 발라드 <span class="em">썸네일 빌더</span>',
    subtitle:"90년대 무드 · 슬픈 발라드를 부르는 20대 한국 여가수 · 실사풍 16:9 (ChatGPT 이미지용 한국어)",
    hint:"이 문장을 그대로 복사해서 ChatGPT에 붙여넣으세요. 잘 나온 컷을 함께 첨부하고 “이 인물로, 아래 설정만 바꿔서”라고 덧붙이면 인물 일관성이 좋아집니다.",
    CORE:[
      "90년대 분위기 속에서 매우 슬픈 발라드를 부르는 20대 한국 여가수를 담은 16:9 가로 유튜브 썸네일 사진."
    ],
    TAIL:"전체적으로 매우 예쁘고 시선을 사로잡는 얼굴이며, 잡티 없이 투명하고 생기 있는 피부와 자연스러운 피부 질감, 또렷하고 조화로운 이목구비를 지녔다. 85mm 인물 렌즈의 얕은 심도로 담은 영화 스틸컷처럼 사실적인 초고화질 이미지다. 화면 안에는 어떤 글자나 로고, 워터마크도 넣지 않는다.",
    ORDER:["face","hair","makeup","framing","pos","outfit","pose","expr","bg","light","cam"],
    OUT:["face","hair","makeup","outfit","pose","expr","bg","light","framing","pos","cam"],
    defaults:{face:0,hair:0,makeup:0,framing:1,pos:0,outfit:0,pose:0,expr:0,bg:0,light:2,cam:0},
    AX:{
      pos:{ name:"인물 위치", opts:[
        {label:"중앙", text:"인물은 화면 중앙에 안정적으로 배치한다."},
        {label:"왼쪽", text:"인물은 화면 왼쪽에 치우쳐 배치하고, 오른쪽에는 배경 여백을 넉넉히 남긴다."},
        {label:"오른쪽", text:"인물은 화면 오른쪽에 치우쳐 배치하고, 왼쪽에는 배경 여백을 넉넉히 남긴다."},
      ]},
      face:{ name:"얼굴 비주얼상", opts:[
        {label:"청순한 미인상", text:"맑고 깨끗한 청순한 미인상이며, 큼직하고 투명한 눈망울이 인상적이다."},
        {label:"고혹적·성숙한 미인", text:"깊고 그윽한 눈매를 지닌 고혹적이고 성숙한 분위기의 미인이다."},
        {label:"러블리·사랑스러운", text:"화사하고 사랑스러운 호감형 얼굴에 부드러운 이목구비를 지녔다."},
      ]},
      hair:{ name:"헤어 (포니테일)", opts:[
        {label:"볼륨 웨이브 포니테일", text:"볼륨감 있게 살짝 웨이브진 긴 머리를 높이 포니테일로 묶었다."},
        {label:"시스루 앞머리", text:"긴 웨이브 머리를 포니테일로 묶고, 얇은 시스루 앞머리를 자연스럽게 내렸다."},
        {label:"잔머리 흘러내림", text:"포니테일로 묶되 얼굴 옆으로 잔머리 몇 가닥이 부드럽게 흘러내린다."},
        {label:"로우 포니테일", text:"긴 웨이브 머리를 목덜미에서 낮게 묶은 로우 포니테일이다."},

      makeup:{ name:"메이크업", opts:[

        {label:"눈가 글로시(눈물)", text:"눈가가 촉촉하게 젖어 반짝이는, 눈물이 어린 듯한 메이크업이다."},
        {label:"차분한 누드톤", text:"차분한 누드톤의 절제된 메이크업이다."},
        {label:"또렷한 눈매+레드립", text:"또렷한 아이라인과 깊은 레드립으로 분위기를 살린 메이크업이다."},
        {label:"글로시 핑크 러블리", text:"발그레한 볼터치와 글로시한 핑크빛 입술의 화사한 메이크업이다."},
      ]},
      framing:{ name:"구도 / 프레이밍", opts:[

        {label:"바스트샷", text:"가슴 위까지 보이는 바스트샷 구도다."},
        {label:"미디엄샷", text:"허리 위까지 보이는 미디엄샷 구도다."},
        {label:"전신 와이드", text:"무대 위 전신이 보이는 와이드 구도다."},
      ]},
      outfit:{ name:"의상", opts:[
        {label:"흰 원피스", text:"가볍고 하늘하늘한 흰색 민소매 원피스를 입고 있다."},
        {label:"검정 새틴", text:"광택이 흐르는 검은색 새틴 민소매 원피스를 입고 있다."},
        {label:"베이지 시폰", text:"은은한 베이지색 시폰 민소매 원피스를 입고 있다."},
        {label:"꽃무늬", text:"작은 꽃무늬가 들어간 여름용 민소매 원피스를 입고 있다."},
        {label:"청록 실크", text:"깊은 청록색 실크 민소매 원피스를 입고 있다."},
      ]},
      pose:{ name:"포즈 / 마이크", opts:[
        {label:"마이크 45도", text:"스탠드 마이크를 잡고 몸을 45도 비스듬히 튼 채 서 있다."},
        {label:"정면", text:"스탠드 마이크 앞에 정면으로 서서 노래한다."},
        {label:"고개 숙임", text:"고개를 살짝 숙이고 마이크에 바짝 다가가 나직이 노래한다."},
        {label:"두 손 감싸기", text:"두 손으로 마이크를 감싸 쥐고 간절하게 노래한다."},
        {label:"손은 가슴에", text:"한 손은 스탠드 마이크를, 다른 손은 가슴에 얹고 노래한다."},
        {label:"고음 열창", text:"눈을 감고 고음을 내지르듯 입을 크게 벌리고 있다."},
        {label:"고개 돌려 응시", text:"마이크에서 살짝 고개를 돌려 먼 곳을 바라보며 노래한다."},
      ]},
      expr:{ name:"시선 / 표정", opts:[
        {label:"마이크 응시·슬픔", text:"시선은 마이크에 둔 채 금방이라도 울 듯한 슬픈 표정을 짓고 있다."},

      bg:{ name:"배경", opts:[

/* ============================================================
   엔진
   ============================================================ */
let activeTab = "ballad";
const pickState = {}; // 탭별 현재 선택 보존
Object.keys(TABS).forEach(id => pickState[id] = {...TABS[id].defaults});

function T(){ return TABS[activeTab]; }
function picks(){ return pickState[activeTab]; }

function assemble(tab, p){
  return [...tab.CORE, ...tab.OUT.map(k => tab.AX[k].opts[p[k] ?? 0].text), tab.TAIL].join(" ");
}

function renderTabs(){
  document.getElementById("tabs").innerHTML = Object.keys(TABS).map(id =>
    `<div class="tab ${id===activeTab?"on":""}" onclick="switchTab('${id}')">${TABS[id].label}</div>`
  ).join("");
}
function renderHeader(){
  const t=T();
  document.getElementById("title").innerHTML = t.title;
  document.getElementById("subtitle").textContent = t.subtitle;
  document.getElementById("hint").textContent = t.hint;
  document.getElementById("combos").textContent =
    t.ORDER.reduce((a,k)=>a*t.AX[k].opts.length,1).toLocaleString("ko-KR");
}
function renderBuilder(){
  const t=T(), p=picks();
  document.getElementById("builder").innerHTML = t.ORDER.map(k=>{
    const ax=t.AX[k];
    const chips=ax.opts.map((o,i)=>
      `<div class="chip ${p[k]===i?"on":""}" onclick="pick('${k}',${i})">${o.label}</div>`).join("");
    return `<div class="axis"><div class="lbl">${ax.name} <span>· ${ax.opts[p[k]].label}</span></div><div class="chips">${chips}</div></div>`;
  }).join("");
}
function updatePreview(){ document.getElementById("promptbox").textContent = assemble(T(), picks()); }
function renderGallery(){
  const t=T();
  document.getElementById("gallery").innerHTML = t.presets.map((pre,idx)=>`
    <div class="gcard">
      <div class="gname">${idx+1}. ${pre.name}</div>
      <div class="gtag">${pre.tag}</div>
      <div class="gtext">${assemble(t, pre.p)}</div>
      <div class="grow">
        <button class="btn primary" onclick="copyPreset(${idx})">복사</button>
        <button class="btn" onclick="loadPreset(${idx})">빌더에 불러오기</button>
      </div>
    </div>`).join("");
}
function updateThemeColor(){ const c=getComputedStyle(document.body).getPropertyValue('--bg').trim(); const m=document.querySelector('meta[name="theme-color"]'); if(m && c) m.setAttribute('content', c); }
function renderAll(){ renderTabs(); renderHeader(); renderBuilder(); updatePreview(); renderGallery(); updateThemeColor(); }

function switchTab(id){ activeTab=id; document.body.dataset.tab=id; renderAll(); window.scrollTo({top:0,behavior:"smooth"}); }
function pick(k,i){ picks()[k]=i; renderBuilder(); updatePreview(); }
function randomize(){ const t=T(); t.ORDER.forEach(k=> picks()[k]=Math.floor(Math.random()*t.AX[k].opts.length)); renderBuilder(); updatePreview(); }
function resetPicks(){ pickState[activeTab]={...T().defaults}; renderBuilder(); updatePreview(); }
function copyCurrent(){ copyText(assemble(T(), picks())); }
function copyPreset(idx){ copyText(assemble(T(), T().presets[idx].p)); }
function loadPreset(idx){ pickState[activeTab]={...T().presets[idx].p}; renderBuilder(); updatePreview(); window.scrollTo({top:0,behavior:"smooth"}); toast("빌더에 불러왔어요"); }

/* 복사 / 토스트 */
function copyText(t){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>toast("복사됨! ChatGPT에 붙여넣으세요"), ()=>fallbackCopy(t));
  } else fallbackCopy(t);
}
function fallbackCopy(t){
  const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("복사됨! ChatGPT에 붙여넣으세요"); }catch(e){ toast("복사 실패 — 직접 선택해 주세요"); }
  document.body.removeChild(ta);
}
let toastTimer;
function toast(msg){
  const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),1800);
}

renderAll();
</script>
